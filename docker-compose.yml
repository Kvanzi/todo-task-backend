services:
  database-1:
    image: postgres:18
    container_name: todo-app-postgres-1
    env_file: .env
    networks:
      - todo-app-network
    ports:
      - "5432:5432"
    volumes:
      - postgres-1-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-1-data: {}

networks:
  todo-app-network: {}